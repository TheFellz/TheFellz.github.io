<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Актировка в Когалыме</title>
    <style>
        /* Стили остаются прежними, можно не менять */
        body { font-family: Arial, sans-serif; background: #f0f4f8; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .container { max-width: 600px; width: 100%; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #333; margin-top: 0; }
        .weather-card { background: #e6f0fa; padding: 20px; border-radius: 15px; text-align: center; margin: 20px 0; font-size: 1.4em; border: 1px solid #b0d4f0; }
        .class-group { background: #f9f9f9; border-radius: 12px; padding: 15px; margin-bottom: 15px; border-left: 5px solid #2a7faa; }
        .class-group h3 { margin: 0 0 10px 0; color: #2a7faa; }
        .chance-bar { height: 30px; background: #4CAF50; color: white; text-align: center; line-height: 30px; border-radius: 15px; font-weight: bold; margin-top: 8px; }
        .disclaimer { font-size: 0.8em; color: #666; text-align: center; margin-top: 25px; padding-top: 15px; border-top: 1px dashed #ccc; }
    </style>
</head>
<body>
    <div class="container">
        <h1>❄️ Актировка в Когалыме</h1>
        
        <!-- Блок с погодой -->
        <div class="weather-card" id="weatherDisplay">
            ⏳ Загружаем данные о погоде...
        </div>

        <!-- Блок с результатами -->
        <div id="resultArea">
            <div class="class-group">
                <h3>🏫 1-4 классы</h3>
                <div id="chance1" class="chance-bar" style="width: 0%; background: #ccc;">0%</div>
            </div>
            <div class="class-group">
                <h3>🏫 5-8 классы</h3>
                <div id="chance2" class="chance-bar" style="width: 0%; background: #ccc;">0%</div>
            </div>
            <div class="class-group">
                <h3>🏫 9-11 классы</h3>
                <div id="chance3" class="chance-bar" style="width: 0%; background: #ccc;">0%</div>
            </div>
        </div>

        <p class="disclaimer">
            ⚠️ Данные носят справочный характер. Окончательное решение о посещении школы принимают родители.
        </p>
    </div>

    <script>
        // ⚠️ ВАЖНО! СЮДА НАДО ВСТАВИТЬ ВАШ КЛЮЧ API
        const API_KEY = "f501185a9ce143da7e57dd5731c4c223";
        
        // Координаты Когалыма (я их уже нашёл)
        const LATITUDE = 62.2654;
        const LONGITUDE = 74.4791;

        // Функция для расчёта шансов (ЗДЕСЬ НУЖНЫ ВАШИ ПРАВИЛА АКТИРОВКИ!)
        function calculateChances(temp, windSpeed) {
            const chance1 = document.getElementById('chance1');
            const chance2 = document.getElementById('chance2');
            const chance3 = document.getElementById('chance3');

            // 🟥 ВАЖНО: Здесь должны быть ваши правила для Когалыма!
            // Сейчас стоят заглушки, чтобы сайт работал. Найдите официальные критерии и подставьте сюда.
            
            let c1 = 0, c2 = 0, c3 = 0;

            // ПРИМЕР (нужно заменить на ваши цифры!):
            if (temp <= -25) c1 = 100; else if (temp <= -20) c1 = 50;
            if (temp <= -28) c2 = 100; else if (temp <= -23) c2 = 50;
            if (temp <= -30) c3 = 100; else if (temp <= -25) c3 = 50;

            // Отображаем результат
            chance1.innerText = c1 + '%';
            chance1.style.background = c1 > 50 ? '#4CAF50' : (c1 > 20 ? '#FF9800' : '#9E9E9E');
            chance1.style.width = c1 + '%';

            chance2.innerText = c2 + '%';
            chance2.style.background = c2 > 50 ? '#4CAF50' : (c2 > 20 ? '#FF9800' : '#9E9E9E');
            chance2.style.width = c2 + '%';

            chance3.innerText = c3 + '%';
            chance3.style.background = c3 > 50 ? '#4CAF50' : (c3 > 20 ? '#FF9800' : '#9E9E9E');
            chance3.style.width = c3 + '%';
        }

        // Функция получения погоды с OpenWeatherMap
        async function fetchWeather() {
            const weatherDiv = document.getElementById('weatherDisplay');
            
            // Проверяем, вставил ли пользователь ключ
            if (API_KEY === "ВСТАВЬТЕ_СЮДА_ВАШ_КЛЮЧ_С_OPENWEATHERMAP") {
                weatherDiv.innerHTML = '❌ Ошибка: не вставлен ключ API!';
                return;
            }

            try {
                // Формируем запрос к OpenWeatherMap
                const url = `https://api.openweathermap.org/data/2.5/weather?lat=${LATITUDE}&lon=${LONGITUDE}&appid=${API_KEY}&units=metric&lang=ru`;
                
                const response = await fetch(url);
                
                if (!response.ok) {
                    throw new Error(`Ошибка сервера: ${response.status}`);
                }
                
                const data = await response.json();
                
                // Достаём температуру и скорость ветра
                const temperature = Math.round(data.main.temp);
                const windSpeed = data.wind.speed;
                
                // Показываем погоду на сайте
                weatherDiv.innerHTML = `🌡️ Температура: <b>${temperature}°C</b> | 💨 Ветер: <b>${windSpeed} м/с</b>`;
                
                // Запускаем расчёт шансов
                calculateChances(temperature, windSpeed);
                
            } catch (error) {
                console.error("Ошибка при получении погоды:", error);
                weatherDiv.innerHTML = '❌ Не удалось загрузить погоду. Проверьте ключ API.';
            }
        }

        // Запускаем получение погоды при загрузке страницы
        fetchWeather();
        
        // Обновляем каждые 10 минут
        setInterval(fetchWeather, 600000);
    </script>
</body>
</html>
